name: Build APKs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build all APK variants
        run: ./gradlew assembleArm64Debug assembleArm7Debug assembleX86Debug assembleUniversalDebug --no-daemon --max-workers=2

      - uses: actions/upload-artifact@v4
        with:
          name: apk-arm64
          path: app/build/outputs/apk/arm64/debug/*.apk

      - uses: actions/upload-artifact@v4
        with:
          name: apk-arm7
          path: app/build/outputs/apk/arm7/debug/*.apk

      - uses: actions/upload-artifact@v4
        with:
          name: apk-x86
          path: app/build/outputs/apk/x86/debug/*.apk

      - uses: actions/upload-artifact@v4
        with:
          name: apk-universal
          path: app/build/outputs/apk/universal/debug/*.apk
